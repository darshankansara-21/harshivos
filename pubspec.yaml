name: harshivos
description: "HARSHIVOS — The world's first AI-powered Autism Companion focused on Regulation, Communication, Learning, and Emotional Wellness."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # UI / Design
  google_fonts: ^6.2.1

  # Voice (Help Me Talk + Social Story narration)
  flutter_tts: ^4.0.2

  # Procedural sound effects (Bubble Pop, Music Garden) — no audio assets,
  # tones are synthesised to WAV bytes at runtime.
  audioplayers: ^6.1.0

  # Local offline-first persistence
  shared_preferences: ^2.3.2

  # AI abstraction layer (Gemini / OpenAI over HTTP)
  http: ^1.2.2

  # IDs for regulation log entries
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

  # Generates all launcher-icon mipmaps from a single source PNG.
  flutter_launcher_icons: ^0.14.1

# App icon generation — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0B1B3A"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/config/
    - assets/icon/

  # Bundled locally so the app is fully offline-first (airplane / hospital /
  # clinic). Nunito is a variable font (OFL); the same file is declared at the
  # weights the theme uses so FontWeight maps to the wght axis.
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 800
